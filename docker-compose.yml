version: "3.9"

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    # 🛠️ FIXED: Moved this here so your Node app gets the REDIS_URL!
    env_file:
      - .env  

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventsdb
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: realtimeticketbooking-redis
    ports:
      - "6379:6379"
    # 🛠️ FIXED: Removed the env_file from here